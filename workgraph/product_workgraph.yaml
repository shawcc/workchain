workgraph:
  id: wg-workgraph-product-v0.1
  name: WorkGraph 产品可推理工作图谱
  version: v0.1
  status: draft
  created_at: 2026-06-19
  principle:
    primary_artifact: reasonable_work_graph
    derived_artifacts:
      - docs/MRD.md
      - docs/PRD.md
      - workgraph/interaction_design.yaml
      - docs/InteractionDesign.md
      - workgraph/wireframe_design.yaml
      - docs/Wireframes.md
    statement: "产品主产物不是文档，而是可推理工作图谱；文档只是图谱的阅读视图、导出快照或汇报格式。"

nodes:
  - id: intent-001
    type: raw_intent
    title: 构建人和 Agent 共同协作的新办公模式
    content: "从目标出发，按逻辑拆解成充分条件和任务，由 Agent 执行并回填证据，形成可推理、可执行、可验收的办公系统。"
    source: conversation
    confidence: high

  - id: thesis-001
    type: product_thesis
    title: 文档不应是核心产物
    content: "Agent 时代的办公系统不应以大段自然语言文档作为最终工作载体，而应以可推理工作图谱作为组织工作的第一性对象。"
    confidence: high

  - id: thesis-002
    type: product_thesis
    title: 推理过程是可复盘和可校准的 f(x)
    content: "推理办公的核心不是沉淀静态文档，而是记录每次 f(x)：x 是当时获得的信息，f(x) 是从信息到阶段结论的推理过程，y 是阶段性推理产物或行动结论。系统记录每次推理过程，复盘时校准的是这条推理链本身。"
    confidence: high

  - id: thesis-003
    type: product_thesis
    title: 所有人和 Agent 的工作都应由推理产生
    content: "不管是人还是 Agent，任何工作都不应孤立拍脑袋发生，而应经历理解目标、确认目标、识别假设和约束、拆解目标、形成行动、执行回填和 Review 反馈。"
    confidence: high

  - id: thesis-004
    type: product_thesis
    title: 企业工作是一条不可断裂的推理链路
    content: "公司里的任何一件事情都应能向上找到出处，说明它服务的更大目标；也应能向下拆解行动，并在执行失败、依赖阻塞或证据不足时向上回流触发重新 review。"
    confidence: high

  - id: thesis-005
    type: product_thesis
    title: WorkGraph 可以承载 OKR 但不是 OKR 工具
    content: "OKR 主要表达 Objective 和 Key Results；WorkGraph 进一步表达目标解释、假设、约束、推理记录、来源追溯、证据验收和异常回流。"
    confidence: high

  - id: product-001
    type: product_definition
    title: WorkGraph
    content: "以目标为根的人-Agent 协作办公系统，将管理者战略意图转化为目标、小目标、任务、证据、验收和反馈构成的可推理工作图谱。"
    confidence: high

  - id: market-001
    type: market_observation
    title: 传统办公工具断裂
    content: "聊天承载讨论但状态不可追踪；文档承载说明但不可执行；项目管理承载任务但缺少目标和决策上下文。"
    confidence: high

  - id: market-002
    type: market_opportunity
    title: 从 AI 助手到 AI 工作系统
    content: "企业需要的不是更会聊天的 AI，而是能够承载目标理解、拆解、执行、证据和验收的组织级工作系统。"
    confidence: high

  - id: user-001
    type: user_role
    title: CEO / 最终决策者
    content: "提出战略目标，确认目标理解、小目标拆解和重大偏差。"
    confidence: high

  - id: user-002
    type: user_role
    title: 目标负责人
    content: "承接目标，补充约束和资源，确认非公司级小目标，处理执行阻塞。"
    confidence: high

  - id: user-003
    type: user_role
    title: 专项 Agent
    content: "参与目标理解、提出假设和风险、执行任务、回填证据和异常。"
    confidence: high

  - id: layer-001
    type: product_layer
    title: 目标决策层
    content: "负责意图理解、目标澄清、假设约束、小目标拆解和人类确认。"
    confidence: high

  - id: layer-002
    type: product_layer
    title: 任务执行层
    content: "负责任务生成、Agent 调度、执行推进、证据回填、验收判断和异常回流。"
    confidence: high

  - id: internal-001
    type: internal_mechanism
    title: 隐性推理
    content: "承载自然语言、直觉、类比、偏好和模糊判断，是推理的前结构形态。"
    confidence: high

  - id: internal-002
    type: internal_mechanism
    title: 显性推理
    content: "沉淀目标、假设、约束、充分条件、小目标和决策理由。"
    confidence: high

  - id: internal-003
    type: internal_mechanism
    title: 可执行推理
    content: "生成任务、依赖、状态、工具调用、证据和验收。"
    confidence: high

  - id: gate-001
    type: approval_gate
    title: 目标确认门
    content: "CEO 确认系统对战略意图的理解，未确认目标不能进入正式执行。"
    confidence: high

  - id: gate-002
    type: approval_gate
    title: 小目标确认门
    content: "CEO 或目标负责人确认小目标拆解路径是否符合战略意图。"
    confidence: high

  - id: gate-003
    type: approval_gate
    title: 重大偏差确认门
    content: "执行中出现目标不可达、假设被推翻、资源不足或合规风险时，回流目标决策层。"
    confidence: high

  - id: object-001
    type: graph_node_type
    title: 原始意图
    content: "保存人类自然语言表达，是图谱的来源节点，不是最终产物。"
    confidence: high

  - id: object-002
    type: graph_node_type
    title: 目标
    content: "经理解和确认后的组织意图，是产品中的主目标对象，包含目标解释、目标值、指标口径、时间范围、假设、约束、成功标准、负责人和来源链路。"
    confidence: high

  - id: object-002a
    type: graph_node_type
    title: 目标值
    content: "Goal 中的量化靶点或结果要求，例如营收 1 亿、留存率提升 20%；包含指标名称、目标值、口径说明和时间范围。"
    confidence: high

  - id: object-002b
    type: graph_node_type
    title: 目标解释
    content: "从原始自然语言目标到结构化 Goal 的推理产物，用于解释目标口径、范围、时间、资源、约束和待澄清问题。"
    confidence: high

  - id: object-003
    type: graph_node_type
    title: 假设
    content: "目标拆解依赖但尚未完全验证的前提。"
    confidence: high

  - id: object-004
    type: graph_node_type
    title: 约束
    content: "执行过程中不可违反的条件，如预算、时间、合规、品牌、安全和资源上限。"
    confidence: high

  - id: object-005
    type: graph_node_type
    title: 子目标节点
    content: "某个目标节点向下拆解出的下一层目标节点；它不是新实体，而是 Goal Node 在下游层级中的视角名称。"
    confidence: high

  - id: object-006
    type: graph_node_type
    title: 行动
    content: "为达成目标节点而生成的可执行动作；当行动需要独立负责人和继续拆解时，它会升格为新的 Goal Node。"
    confidence: high

  - id: object-007
    type: graph_node_type
    title: 证据
    content: "证明任务完成或目标推进的材料，可以是数据、文件、系统日志、链接、用户确认或实验结果。"
    confidence: high

  - id: object-008
    type: graph_node_type
    title: 验收
    content: "基于标准和证据判断目标节点或其行动是否达成。"
    confidence: high

  - id: object-008a
    type: graph_node_type
    title: 成功标准
    content: "用于判断 Goal Node 是否成立和完成的标准，可以包含量化指标、证据要求、质量标准和验收条件。"
    confidence: high

  - id: object-009
    type: graph_node_type
    title: 异常
    content: "执行过程中出现的阻塞、偏差、假设失效、资源不足或风险事件。"
    confidence: high

  - id: object-010
    type: graph_node_type
    title: 推理过程
    content: "记录一次 f(x) 的展开过程：如何选择输入、如何识别前提、如何比较证据、如何处理约束、如何形成阶段结论。"
    confidence: high

  - id: object-011
    type: graph_node_type
    title: 信息输入
    content: "记录某次推理或决策时系统已知的信息，即 x，包括数据、证据、背景、约束、假设和上下文。"
    confidence: high

  - id: object-012
    type: graph_node_type
    title: 推理记录
    content: "记录一次 f(x) 推理过程，包括输入信息、推理步骤、关键前提、证据权重、阶段结论、置信度、责任主体和后验反馈。"
    confidence: high

  - id: object-013
    type: graph_node_type
    title: 目标节点
    content: "产品唯一核心工作对象。Goal、SubGoal、WorkUnit 本质上都是 Goal Node，只是所处层级、负责人和上下游视角不同；它包含目标解释、目标值、假设、约束、成功标准、推理记录、行动、证据和 review。"
    confidence: high

  - id: object-014
    type: graph_node_type
    title: Review 记录
    content: "记录下游失败、依赖阻塞、证据不足、假设失效或约束变化如何影响上游目标，并形成重新讨论、重新确认或重新拆解的结论。"
    confidence: high

  - id: concept-okr-001
    type: concept_mapping
    title: OKR 与 WorkGraph 对照
    content: "Objective 对应 Goal Node；Key Results 对应 Target、Success Criteria 和 Evidence Requirement；Initiative 或 Task 对应 Goal Node 的行动，必要时可升格为下一级 Goal Node；Check-in 对应 Review。"
    confidence: high

  - id: relation-001
    type: graph_relation_type
    title: derives_from
    content: "表示一个节点从另一个节点推导或生成。"
    confidence: high

  - id: relation-002
    type: graph_relation_type
    title: supports
    content: "表示小目标、任务或证据支撑上级目标。"
    confidence: high

  - id: relation-003
    type: graph_relation_type
    title: depends_on
    content: "表示任务、目标或决策之间存在依赖。"
    confidence: high

  - id: relation-004
    type: graph_relation_type
    title: proves
    content: "表示证据证明任务、小目标或目标的完成状态。"
    confidence: high

  - id: relation-005
    type: graph_relation_type
    title: approves
    content: "表示确认门对目标、小目标或偏差处理方案的批准关系。"
    confidence: high

  - id: relation-006
    type: graph_relation_type
    title: impacts
    content: "表示异常、风险或变更对目标、任务和执行路径的影响。"
    confidence: high

  - id: relation-007
    type: graph_relation_type
    title: decomposes_to
    content: "表示一个目标、结论或行动计划向下拆解为下一层工作单元。"
    confidence: high

  - id: relation-008
    type: graph_relation_type
    title: feedback_to
    content: "表示下游执行结果、异常、证据不足或依赖阻塞向上反馈到受影响的目标、假设、约束或决策。"
    confidence: high

  - id: relation-009
    type: graph_relation_type
    title: reviews
    content: "表示 review 记录对工作单元、目标拆解或行动计划进行复盘、校准和重新安排。"
    confidence: high

  - id: flow-001
    type: workflow
    title: 战略目标落地主流程
    content: "CEO 输入战略意图 -> 人和 Agent 共同理解目标 -> 充分讨论假设、约束和不清楚的地方 -> 负责人确认目标 -> 拆解为下一层目标或行动计划 -> 下一层继续按同一逻辑理解、确认、拆解和执行 -> 回填证据 -> Review 执行结果、依赖和假设 -> 成功继续推进，失败向上回流重新讨论和安排。"
    confidence: high

  - id: flow-002
    type: workflow
    title: 单个工作单元流程
    content: "接收上游来源 -> 理解当前目标 -> 补齐问题、假设和约束 -> 形成阶段结论 -> 拆解为下游工作 -> 执行或交给下游执行 -> 收集证据与状态 -> Review 是否达成目标 -> 必要时反馈上游重新推理。"
    confidence: high

  - id: flow-003
    type: workflow
    title: Review 回流流程
    content: "下游任务未完成、依赖阻塞、证据不足或假设失效 -> 系统识别受影响的上游目标和行动计划 -> 生成 review 记录和决策待办 -> 相关负责人、人和 Agent 重新讨论目标、假设和约束 -> 维持原计划、调整资源、重排任务或重新拆解。"
    confidence: high

  - id: requirement-001
    type: product_requirement
    title: 目标创建
    content: "支持自然语言输入目标，上传背景材料，抽取市场、指标、目标值、时间周期、业务范围、约束和负责人。"
    confidence: high

  - id: requirement-002
    type: product_requirement
    title: 目标理解与澄清
    content: "多 Agent 对目标进行分析，生成澄清问题、隐含假设、冲突约束和目标理解稿。"
    confidence: high

  - id: requirement-003
    type: product_requirement
    title: 小目标拆解
    content: "基于目标、假设和约束生成小目标树，并说明每个小目标如何支撑总目标。"
    confidence: high

  - id: requirement-004
    type: product_requirement
    title: 任务生成
    content: "基于确认后的小目标生成任务列表、依赖关系、责任方、验收标准和证据要求。"
    confidence: high

  - id: requirement-005
    type: product_requirement
    title: Agent 调度与执行
    content: "将任务分配给 Agent 或人类角色，支持工具调用、状态更新、执行日志和人工介入请求。"
    confidence: high

  - id: requirement-006
    type: product_requirement
    title: 证据回填
    content: "支持 Agent 或人工上传证据，并将证据关联到任务、小目标和目标。"
    confidence: high

  - id: requirement-007
    type: product_requirement
    title: 验收判断
    content: "根据验收标准和证据判断任务、小目标或目标是否达成。"
    confidence: high

  - id: requirement-008
    type: product_requirement
    title: 异常回流
    content: "识别重大偏差并回流目标决策层，生成偏差报告和决策选项。"
    confidence: high

  - id: requirement-009
    type: product_requirement
    title: 推理记录与推理过程校准
    content: "系统记录关键推理的输入信息 x、推理过程 f(x)、阶段结论 y、证据和后验反馈，用于复盘每条推理链路中哪些信息有效、哪些前提失真、哪些推理步骤需要调整。"
    confidence: high

  - id: requirement-010
    type: product_requirement
    title: 来源追溯与 Review 回流
    content: "每个工作单元必须能向上追溯来源目标、推理依据、假设和约束；下游任务失败、依赖阻塞、证据不足或假设失效时，必须触发上游 review、重新讨论和必要的重新拆解。"
    confidence: high

  - id: artifact-001
    type: derived_artifact
    title: MRD 阅读视图
    content: "面向市场、商业和定位的阅读视图，由产品工作图谱导出。"
    uri: docs/MRD.md
    confidence: high

  - id: artifact-002
    type: derived_artifact
    title: PRD 阅读视图
    content: "面向需求、流程和功能定义的阅读视图，由产品工作图谱导出。"
    uri: docs/PRD.md
    confidence: high

  - id: artifact-003
    type: derived_graph
    title: 交互设计图谱
    content: "面向产品交互设计的可推理图谱，包含页面、状态、操作、Agent 行为和协作模拟。"
    uri: workgraph/interaction_design.yaml
    confidence: high

  - id: artifact-004
    type: derived_artifact
    title: 交互设计阅读视图
    content: "面向人类评审的交互设计草稿，由交互设计图谱导出。"
    uri: docs/InteractionDesign.md
    confidence: high

  - id: artifact-005
    type: derived_graph
    title: 低保真线框图设计图谱
    content: "面向 MVP 原型的页面结构图谱，包含页面布局、字段、按钮、状态、空态和异常态。"
    uri: workgraph/wireframe_design.yaml
    confidence: high

  - id: artifact-006
    type: derived_artifact
    title: 低保真线框图阅读视图
    content: "面向人类评审的 MVP 低保真线框图说明，由线框图设计图谱导出。"
    uri: docs/Wireframes.md
    confidence: high

